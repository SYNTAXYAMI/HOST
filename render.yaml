services:
  - type: web
    name: shadman-hosting
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
